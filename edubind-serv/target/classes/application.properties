spring.application.name=edubind-serv

# H2 in-memory database (dev/test)
spring.datasource.url=jdbc:h2:mem:edubinddb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# Firmware artifacts storage directory (absolute or relative to working dir)
edubind.firmware.storage-dir=./firmware-artifacts
